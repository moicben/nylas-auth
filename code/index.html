<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code de vérification – Admin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ms-blue: #0078D4;
      --ms-blue-dark: #106EBE;
      --ms-gray-900: #201F1E;
      --ms-gray-600: #605E5C;
      --ms-gray-200: #E1DFDD;
      --ms-gray-100: #F3F2F1;
      --ms-white: #FFFFFF;
      --ms-green: #107C10;
      --ms-font: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body {
      font-family: var(--ms-font);
      background: var(--ms-gray-100);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ms-gray-900);
    }
    .card {
      background: var(--ms-white);
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 400px;
      padding: 36px 40px 32px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .desc {
      font-size: 13px;
      color: var(--ms-gray-600);
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      font-size: 22px;
      font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
      letter-spacing: 4px;
      text-align: center;
      border: 1px solid var(--ms-gray-200);
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--ms-blue); }
    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
      text-align: center;
      transition: color 0.3s;
    }
    .status.saving { color: var(--ms-blue); }
    .status.saved  { color: var(--ms-green); }
    .status.error  { color: #D13438; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Code de vérification</h1>
    <p class="desc">Saisissez le code à afficher lors de l'étape 2FA. Sauvegarde automatique.</p>
    <label for="codeInput">Code (8 caractères)</label>
    <input type="text" id="codeInput" maxlength="8" placeholder="XXXXXXXX" autocomplete="off" />
    <div class="status" id="status"></div>
  </div>

  <script>
    const input = document.getElementById('codeInput');
    const status = document.getElementById('status');
    let debounceTimer = null;

    async function loadCode() {
      try {
        const res = await fetch('/api/verification-code');
        const data = await res.json();
        input.value = data.code || '';
      } catch (e) {
        console.error('Load error', e);
      }
    }

    async function saveCode(code) {
      status.textContent = 'Sauvegarde…';
      status.className = 'status saving';
      try {
        const res = await fetch('/api/verification-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        if (res.ok) {
          status.textContent = 'Sauvegardé ✓';
          status.className = 'status saved';
        } else {
          throw new Error('Save failed');
        }
      } catch (e) {
        status.textContent = 'Erreur de sauvegarde';
        status.className = 'status error';
      }
    }

    input.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        saveCode(input.value);
      }, 500);
    });

    loadCode();
  </script>
</body>
</html>
