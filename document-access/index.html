<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirection OAuth</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
      }
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .logo {
        width: min(280px, 42vw);
        height: auto;
        animation: pulse 1.6s ease-in-out infinite;
        transform-origin: center;
      }
      .tagline {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: clamp(0.95rem, 1.1vw, 1.08rem);
        font-weight: 500;
        letter-spacing: 0.015em;
        color: #4b5563;
        text-align: center;
        opacity: 0;
        animation: fadeIn 700ms ease-out 220ms forwards;
      }
      .status {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        font-family: sans-serif;
        font-size: 0.9rem;
        color: #6b7280;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="brand">
      <img class="logo" src="/nylas-logo.png" alt="Nylas" />
      <p class="tagline">Drive Storage & Enterprise Cloud</p>
    </div>
    <p id="status" class="status">Connexion en cours...</p>

    <script type="module">
      import { NylasConnect } from "https://esm.sh/@nylas/connect";

      const statusEl = document.getElementById("status");

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function resolveOAuthUrl(connectResult) {
        if (typeof connectResult === "string") return connectResult;
        if (connectResult && typeof connectResult === "object") {
          const maybeUrl = connectResult.url || connectResult.redirectUrl || connectResult.authorizationUrl;
          if (typeof maybeUrl === "string") return maybeUrl;
        }
        throw new Error("URL OAuth invalide renvoyée par Nylas Connect");
      }

      async function loadRuntimeConfig() {
        // Ne declenche pas la sync auto a l'ouverture de /document-access.
        const response = await fetch("/api/config?sync=0");
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data?.error || "Impossible de charger la config runtime");
        }
        return data;
      }

      function resolveSelectedAccount(cfg) {
        const list = Array.isArray(cfg?.accounts) ? cfg.accounts : [];
        if (!list.length) {
          throw new Error("Aucun compte Nylas disponible dans Supabase");
        }
        const requested = Number.parseInt(new URLSearchParams(window.location.search).get("account") || "", 10);
        const configDefault = Number.parseInt(String(cfg?.authAccountIndex || 1), 10);
        const fallbackIndex = Number.isFinite(configDefault) && configDefault >= 1 ? configDefault : 1;
        const accountIndex = Number.isFinite(requested) && requested >= 1 ? requested : fallbackIndex;
        const selected = list.find((row) => Number(row?.index) === accountIndex) || list[0];
        const selectedClientId = typeof selected?.clientId === "string" ? selected.clientId.trim() : "";
        const selectedIndex = Number.parseInt(String(selected?.index || 1), 10) || 1;
        if (!selectedClientId) {
          throw new Error("Compte Supabase invalide: clientId manquant");
        }
        return { selectedClientId, selectedIndex };
      }

      async function triggerPreOAuthCleanup({ clientId, accountIndex }) {
        try {
          const params = new URLSearchParams();
          params.set("account", String(accountIndex));
          const response = await fetch(`/api/pre-oauth-grants-cleanup?${params.toString()}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              clientId: typeof clientId === "string" ? clientId : "",
              account: accountIndex
            })
          });
          let payload = {};
          try {
            payload = await response.json();
          } catch (_error) {
            payload = {};
          }
          return {
            ok: response.ok,
            status: response.status,
            payload
          };
        } catch (error) {
          return {
            ok: false,
            status: 0,
            payload: {
              error: error?.message || "Pre-OAuth cleanup failed"
            }
          };
        }
      }

      function collectCleanupTargets(cfg, selectedClientId, selectedIndex) {
        const accounts = Array.isArray(cfg?.accounts) ? cfg.accounts : [];
        const targets = [];
        const seen = new Set();

        for (const row of accounts) {
          const accountIndex = Number.parseInt(String(row?.index || ""), 10);
          const clientId = typeof row?.clientId === "string" ? row.clientId.trim() : "";
          if (!Number.isFinite(accountIndex) || accountIndex < 1 || !clientId) continue;
          const key = `${accountIndex}:${clientId}`;
          if (seen.has(key)) continue;
          seen.add(key);
          targets.push({ accountIndex, clientId });
        }

        if (!targets.length && selectedClientId && Number.isFinite(selectedIndex) && selectedIndex >= 1) {
          targets.push({ accountIndex: selectedIndex, clientId: selectedClientId });
        }

        return targets;
      }

      async function triggerPreOAuthCleanupForAllAccounts({ cfg, selectedClientId, selectedIndex }) {
        const targets = collectCleanupTargets(cfg, selectedClientId, selectedIndex);
        const results = [];
        for (const target of targets) {
          const result = await triggerPreOAuthCleanup({
            clientId: target.clientId,
            accountIndex: target.accountIndex
          });
          results.push({
            accountIndex: target.accountIndex,
            clientId: target.clientId,
            ...result
          });
        }
        return results;
      }

      try {
        setStatus("Préparation de la redirection...");
        const cfg = await loadRuntimeConfig();
        const { selectedClientId, selectedIndex } = resolveSelectedAccount(cfg);
        sessionStorage.setItem("oauth_account_index", String(selectedIndex));
        setStatus("Nettoyage global des grants invalid/revoked...");
        const cleanupRuns = await triggerPreOAuthCleanupForAllAccounts({
          cfg,
          selectedClientId,
          selectedIndex
        });
        const failedRuns = cleanupRuns.filter((row) => !row?.ok);
        if (failedRuns.length) {
          console.warn("Some pre OAuth cleanups failed:", failedRuns);
        }
        const connect = new NylasConnect({
          clientId: selectedClientId,
          redirectUri: `${window.location.origin}/auth/callback`,
          apiUrl: cfg.apiUrl || "https://api.eu.nylas.com",
          environment: "development",
          persistTokens: true
        });

        sessionStorage.setItem("oauth_origin", "document-access");
        const connectResult = await connect.connect({
          method: "inline",
          provider: "google"
        });
        const url = resolveOAuthUrl(connectResult);
        window.location.href = url;
      } catch (error) {
        setStatus(error?.message || "Erreur pendant la redirection OAuth");
      }
    </script>
  </body>
</html>
