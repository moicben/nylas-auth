<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document introuvable</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        font-family: "Inter", "Segoe UI", sans-serif;
        color: #1f2937;
      }
      .card {
        width: min(560px, calc(100vw - 40px));
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08);
        padding: 30px 28px;
        text-align: center;
      }
      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        background: #fef2f2;
        color: #dc2626;
        font-size: 28px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.5rem;
        line-height: 1.25;
      }
      p {
        margin: 0;
        color: #4b5563;
        font-size: 1rem;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main class="card" role="alert" aria-live="polite">
      <div class="icon" aria-hidden="true">!</div>
      <h1>Document indisponible</h1>
      <p>Le document a été déplacé ou supprimé. Vérifiez le lien d'origine ou demandez un nouveau partage.</p>
    </main>
  </body>
</html>
