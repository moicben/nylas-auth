<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send Invoice Email</title>
    <link rel="icon" href="https://stripe.com/favicon.ico" type="image/x-icon">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Ubuntu, sans-serif;
        background: #f6f9fc;
        color: #32325d;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      /* === LEFT: FORM === */
      .form-panel {
        flex: 0 0 420px;
        background: #fff;
        border-right: 1px solid #e6ebf1;
        padding: 32px 28px;
        overflow-y: auto;
        max-height: 100vh;
      }

      .form-title {
        font-size: 20px;
        font-weight: 600;
        color: #32325d;
        margin-bottom: 4px;
      }

      .form-subtitle {
        font-size: 13px;
        color: #8898aa;
        margin-bottom: 24px;
      }

      .field-group {
        margin-bottom: 16px;
      }

      .field-group label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        color: #8898aa;
        margin-bottom: 4px;
        letter-spacing: 0.5px;
      }

      .field-group input,
      .field-group select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-family: inherit;
        font-size: 14px;
        color: #32325d;
        outline: none;
        background: #fff;
      }

      .field-group input:focus,
      .field-group select:focus {
        border-color: #0074d4;
        box-shadow: 0 0 0 1px #0074d4;
      }

      .field-group input::placeholder {
        color: #aab7c4;
      }

      .field-row {
        display: flex;
        gap: 12px;
      }

      .field-row .field-group {
        flex: 1;
      }

      .separator {
        border: none;
        border-top: 1px solid #e6ebf1;
        margin: 20px 0;
      }

      .section-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        color: #0074d4;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
      }

      .send-btn {
        width: 100%;
        padding: 14px 0;
        background: #0074d4;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-family: inherit;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 8px;
      }

      .send-btn:hover {
        background: #0062b3;
      }

      .send-btn:disabled {
        background: #aab7c4;
        cursor: not-allowed;
      }

      .status-msg {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
      }

      .status-msg.success {
        display: block;
        background: #e6f9ee;
        color: #1a7f37;
        border: 1px solid #a3e4b8;
      }

      .status-msg.error {
        display: block;
        background: #fef2f2;
        color: #e25950;
        border: 1px solid #f5c6c6;
      }

      .status-msg.loading {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #eef6ff;
        color: #0074d4;
        border: 1px solid #b3d4f7;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid #b3d4f7;
        border-top-color: #0074d4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        flex-shrink: 0;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* === RIGHT: PREVIEW === */
      .preview-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #f0f2f5;
      }

      .preview-tabs {
        display: flex;
        background: #fff;
        border-bottom: 1px solid #e6ebf1;
        padding: 0 24px;
      }

      .preview-tab {
        padding: 12px 20px;
        font-size: 13px;
        font-weight: 600;
        color: #8898aa;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
        font-family: inherit;
      }

      .preview-tab.active {
        color: #0074d4;
        border-bottom-color: #0074d4;
      }

      .preview-frame-container {
        flex: 1;
        padding: 24px;
        display: flex;
        justify-content: center;
        overflow: auto;
      }

      .preview-frame-container iframe {
        width: 100%;
        max-width: 700px;
        height: 100%;
        min-height: 600px;
        border: 1px solid #e6ebf1;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      }

      #preview-verification {
        padding: 0;
      }

      #preview-verification iframe {
        max-width: 100%;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }

      .preview-hidden {
        display: none !important;
      }

      @media (max-width: 900px) {
        .layout {
          flex-direction: column;
        }
        .form-panel {
          flex: none;
          max-height: none;
          border-right: none;
          border-bottom: 1px solid #e6ebf1;
        }
        .preview-frame-container iframe {
          min-height: 500px;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- LEFT: FORM -->
      <div class="form-panel">
        <div class="form-title">Send Invoice Email</div>
        <div class="form-subtitle">Fill in the details and preview the email before sending.</div>

        <div class="section-label">Recipient</div>

        <div class="field-group">
          <label>Email address</label>
          <input type="email" id="order_email" placeholder="client@email.com" />
        </div>

        <hr class="separator" />
        <div class="section-label">Merchant</div>

        <div class="field-group">
          <label>Shop name</label>
          <input type="text" id="merchant_name" placeholder="Amazon" />
        </div>

        <div class="field-group">
          <label>Website URL</label>
          <input type="text" id="merchant_url" placeholder="amazon.fr" />
        </div>

        <div class="field-group">
          <label>Logo URL</label>
          <input type="text" id="merchant_logo" placeholder="https://logo.clearbit.com/amazon.fr" />
        </div>

        <hr class="separator" />
        <div class="section-label">Order</div>

        <div class="field-row">
          <div class="field-group">
            <label>Amount</label>
            <input type="text" id="order_amount" placeholder="129.99" />
          </div>
          <div class="field-group">
            <label>Currency</label>
            <select id="order_devise">
              <option value="€">EUR (€)</option>
              <option value="$">USD ($)</option>
              <option value="£">GBP (£)</option>
              <option value="CA$">CAD (CA$)</option>
              <option value="FCFA">XOF (FCFA)</option>
              <option value="CHF">CHF (CHF)</option>
              <option value="¥">JPY (¥)</option>
              <option value="¥">CNY (¥)</option>
              <option value="A$">AUD (A$)</option>
              <option value="₹">INR (₹)</option>
              <option value="R$">BRL (R$)</option>
              <option value="₩">KRW (₩)</option>
              <option value="SEK">SEK (kr)</option>
              <option value="PLN">PLN (zł)</option>
              <option value="MAD">MAD (د.م.)</option>
            </select>
          </div>
        </div>

        <div class="field-group">
          <label>Date initiated</label>
          <input type="text" id="order_date" placeholder="Apr 3, 2026" />
        </div>

        <div class="field-group">
          <label>Reference (optional)</label>
          <input type="text" id="order_ref" placeholder="1002-4480" />
        </div>

        <hr class="separator" />
        <div class="section-label">Card (optional)</div>

        <div class="field-row">
          <div class="field-group">
            <label>Card brand</label>
            <select id="card_brand">
              <option value="">None</option>
              <option value="Visa">Visa</option>
              <option value="Mastercard">Mastercard</option>
            </select>
          </div>
          <div class="field-group">
            <label>Last 4 digits</label>
            <input type="text" id="card_digits" placeholder="4242" maxlength="4" />
          </div>
        </div>

        <hr class="separator" />

        <button class="send-btn" id="send-btn" onclick="sendInvoice()">Send Email</button>
        <div class="status-msg" id="status-msg"></div>
      </div>

      <!-- RIGHT: PREVIEW -->
      <div class="preview-panel">
        <div class="preview-tabs">
          <button class="preview-tab active" data-tab="invoice" onclick="switchTab('invoice')">Invoice Email</button>
          <button class="preview-tab" data-tab="verification" onclick="switchTab('verification')">Verification Page</button>
        </div>
        <div class="preview-frame-container" id="preview-invoice">
          <iframe id="iframe-invoice" src="about:blank"></iframe>
        </div>
        <div class="preview-frame-container preview-hidden" id="preview-verification">
          <iframe id="iframe-verification" src="about:blank"></iframe>
        </div>
      </div>
    </div>

    <script>
      const fields = ['order_email', 'merchant_name', 'merchant_url', 'merchant_logo', 'order_amount', 'order_devise', 'order_date', 'order_ref', 'card_brand', 'card_digits'];

      // Pre-fill date with today
      document.getElementById('order_date').value = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });


      function getValues() {
        const vals = {};
        fields.forEach(f => {
          const el = document.getElementById(f);
          vals[f] = el.value.trim();
        });
        return vals;
      }

      function buildQueryString() {
        const v = getValues();
        const p = new URLSearchParams({
          merchant_name: v.merchant_name,
          merchant_url: v.merchant_url,
          merchant_logo: v.merchant_logo,
          order_amount: v.order_amount,
          order_devise: v.order_devise,
          order_date: v.order_date,
          order_email: v.order_email
        });
        if (v.order_ref) p.set('order_ref', v.order_ref);
        if (v.card_brand) p.set('card_brand', v.card_brand);
        if (v.card_digits) p.set('card_digits', v.card_digits);
        return p.toString();
      }

      function updatePreview() {
        const qs = buildQueryString();
        document.getElementById('iframe-invoice').src = '/api/preview-invoice?' + qs;
        document.getElementById('iframe-verification').src = '/verification?' + qs;
      }

      // Debounce preview updates
      let debounceTimer;
      function debouncedUpdate() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(updatePreview, 400);
      }

      // Attach listeners to all fields
      fields.forEach(f => {
        document.getElementById(f).addEventListener('input', debouncedUpdate);
        document.getElementById(f).addEventListener('change', debouncedUpdate);
      });

      // Tab switching
      function switchTab(tab) {
        document.querySelectorAll('.preview-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

        document.getElementById('preview-invoice').classList.toggle('preview-hidden', tab !== 'invoice');
        document.getElementById('preview-verification').classList.toggle('preview-hidden', tab !== 'verification');
      }

      // Send email
      async function sendInvoice() {
        const v = getValues();
        const btn = document.getElementById('send-btn');
        const status = document.getElementById('status-msg');

        // Validate required fields
        const required = ['order_email', 'merchant_name', 'merchant_url', 'order_amount'];
        const missing = required.filter(f => !v[f]);
        if (missing.length) {
          status.className = 'status-msg error';
          status.textContent = 'Please fill in all required fields: ' + missing.join(', ');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Sending...';
        status.className = 'status-msg';
        status.style.display = 'none';

        try {
          const payload = {
            to: v.order_email,
            subject: '[Action Required] Your ' + v.merchant_name + ' payment of ' + v.order_devise + v.order_amount,
            merchant_name: v.merchant_name,
            merchant_url: v.merchant_url,
            merchant_logo: v.merchant_logo,
            order_amount: v.order_amount,
            order_devise: v.order_devise,
            order_date: v.order_date,
            card_brand: v.card_brand || '',
            card_digits: v.card_digits || '',
            order_ref: v.order_ref || '',
            order_email: v.order_email,
          }; 

          const res = await fetch('/api/send-invoice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const data = await res.json();

          if (res.ok) {
            status.className = 'status-msg loading';
            status.innerHTML = '<div class="spinner"></div> Delivering email to ' + v.order_email + '...';
            await new Promise(r => setTimeout(r, 10000));
            status.className = 'status-msg success';
            status.textContent = 'Email sent successfully to ' + v.order_email;
          } else {
            status.className = 'status-msg error';
            status.textContent = data.error || 'Failed to send email';
          }
        } catch (err) {
          status.className = 'status-msg error';
          status.textContent = 'Network error: ' + err.message;
        } finally {
          btn.disabled = false;
          btn.textContent = 'Send Email';
        }
      }
    </script>
  </body>
</html>
