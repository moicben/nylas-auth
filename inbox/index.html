<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inbox Nylas</title>
    <link rel="icon" type="image/png" href="/assets/nylas-favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/assets/nylas-favicon-16x16.png" sizes="16x16" />
    <link rel="shortcut icon" href="/assets/nylas-favicon-32x32.png" type="image/png" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: sans-serif;
        background: #111827;
        color: #e5e7eb;
        overflow: hidden;
      }
      .layout {
        height: 100vh;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #374151;
        padding: 14px 18px;
      }
      .topbar h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
      }
      .topbar a {
        color: #93c5fd;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid #374151;
        padding: 10px 18px;
      }
      .toolbar select,
      .toolbar input {
        background: #1f2937;
        color: #e5e7eb;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 8px 10px;
      }
      .grant-dropdown {
        position: relative;
        min-width: 380px;
        max-width: min(560px, 95vw);
      }
      .grant-dropdown-btn {
        position: relative;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        background: #111827;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 8px 10px;
        min-height: 38px;
        color: #e5e7eb;
        cursor: pointer;
      }
      .grant-dropdown-btn:hover {
        border-color: #4b5563;
        background: #1f2937;
      }
      .grant-dropdown-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .grant-dropdown-btn-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      .grant-dropdown-btn-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.92rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .grant-status-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        flex: 0 0 9px;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
      }
      .grant-status-dot.is-valid {
        background: #22c55e;
      }
      .grant-status-dot.is-invalid {
        background: #ef4444;
      }
      .grant-title-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .grant-tag {
        flex-shrink: 0;
        padding: 1px 6px;
        font-size: 0.7rem;
        font-weight: 600;
        border-radius: 4px;
        background: #e0e7ff;
        color: #3730a3;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .grant-dropdown-btn-meta {
        display: none;
      }
      .source-tab-icon {
        width: 16px;
        height: 16px;
        display: inline-block;
      }
      .grant-dropdown-btn-arrow {
        color: #9ca3af;
        font-size: 0.8rem;
      }
      .grant-dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        width: 100%;
        height: auto;
        max-height: 80vh;
        overflow-y: auto;
        background: #0f172a;
        border: 1px solid #374151;
        border-radius: 12px;
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.38);
        padding: 8px;
        z-index: 40;
      }
      .grant-option {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 10px;
        background: #111827;
        color: #e5e7eb;
        text-align: left;
        padding: 10px 12px;
        margin-bottom: 6px;
        cursor: pointer;
      }
      .grant-option:last-child {
        margin-bottom: 0;
      }
      .grant-option:hover {
        background: #1f2937;
        border-color: #374151;
      }
      .grant-option.active {
        border-color: #60a5fa;
        background: #1e3a8a;
      }
      .grant-option-title {
        position: relative;
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 4px;
        padding-right: 52px;
        font-size: 0.9rem;
        font-weight: 600;
      }
      .grant-copy-btn {
        position: absolute;
        top: 50%;
        right: 42px;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: 1px solid transparent;
        border-radius: 5px;
        color: #9ca3af;
        cursor: pointer;
        padding: 2px 4px;
        transition: color 0.15s, border-color 0.15s;
      }
      .grant-delete-btn {
        right: 0;
      }
      .grant-copy-btn:hover {
        color: #e5e7eb;
        border-color: #4b5563;
      }
      .grant-copy-btn.copied {
        color: #22c55e;
      }
      .grant-toolbar-copy-btn {
        position: absolute;
        right: 28px;
        top: 50%;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: 1px solid transparent;
        border-radius: 4px;
        color: #9ca3af;
        cursor: pointer;
        padding: 4px;
        transition: color 0.15s, border-color 0.15s;
        z-index: 1;
      }
      .grant-toolbar-copy-btn:hover {
        color: #e5e7eb;
        border-color: #4b5563;
      }
      .grant-toolbar-copy-btn.copied {
        color: #22c55e;
      }
      .grant-option-meta {
        margin: 0;
        font-size: 0.78rem;
        color: #9ca3af;
      }
      .grant-empty {
        margin: 4px 2px;
        color: #9ca3af;
        font-size: 0.85rem;
      }
      .toolbar input {
        min-width: 400px;
      }
      .toolbar button {
        border: 1px solid #374151;
        background: #1f2937;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
      #refreshBtn {
        min-width: 38px;
        font-size: 1rem;
        line-height: 1;
      }
      #status {
        color: #9ca3af;
        font-size: 0.9rem;
        margin-left: auto;
      }
      .split {
        min-height: 0;
        flex: 1 1 auto;
        display: grid;
        grid-template-columns: 340px 1fr;
        overflow: hidden;
      }
      .list {
        min-height: 0;
        overflow-y: auto;
        border-right: 1px solid #374151;
      }
      .item {
        width: 100%;
        text-align: left;
        border: 0;
        border-bottom: 1px solid #1f2937;
        background: transparent;
        color: inherit;
        padding: 12px 14px;
        cursor: pointer;
      }
      .item:hover {
        background: #1f2937;
      }
      .item.active {
        background: #1d4ed8;
      }
      .item-subject {
        margin: 0 0 4px;
        font-size: 0.92rem;
        font-weight: 600;
      }
      .item-meta {
        margin: 0;
        color: #9ca3af;
        font-size: 0.82rem;
      }
      .item-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 5px;
      }
      .item-tag {
        display: inline-block;
        padding: 1px 6px;
        font-size: 0.68rem;
        font-weight: 600;
        border-radius: 4px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        line-height: 1.5;
      }
      .item-tag.tag-unread {
        background: #1e3a5f;
        color: #60a5fa;
      }
      .item-tag.tag-read {
        background: #1a2e1a;
        color: #6ee7b7;
      }
      .item-tag.tag-starred {
        background: #422006;
        color: #fbbf24;
      }
      .item-tag.tag-folder {
        background: #1f2937;
        color: #9ca3af;
        border: 1px solid #374151;
      }
      .item-tag.tag-trash {
        background: #3b1111;
        color: #f87171;
        border: 1px solid #7f1d1d;
      }
      .reader {
        min-height: 0;
        overflow-y: auto;
        padding: 16px;
      }
      .reader h2 {
        margin: 0 0 10px;
        font-size: 1.1rem;
      }
      .reader .meta {
        color: #9ca3af;
        font-size: 0.9rem;
        margin: 0 0 14px;
      }
      .reader pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: inherit;
        line-height: 1.45;
      }
      .reader .email-body {
        overflow-wrap: anywhere;
      }
      .reader .email-body img,
      .reader .email-body table {
        max-width: 100% !important;
      }
      .reader .email-body img {
        height: auto !important;
      }
      .empty {
        color: #9ca3af;
        padding: 14px;
      }
      #loadMoreBtn {
        margin: 10px 14px 14px;
      }
      /* Stats Modal */
      .stats-modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .stats-modal[hidden] {
        display: none;
      }
      .stats-modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.6);
      }
      .stats-modal-content {
        position: relative;
        width: 94vw;
        max-width: 720px;
        max-height: 90vh;
        background: #0f172a;
        border: 1px solid #374151;
        border-radius: 14px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .stats-modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid #374151;
      }
      .stats-modal-header h2 {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }
      .stats-modal-header button {
        background: none;
        border: none;
        color: #9ca3af;
        font-size: 1.4rem;
        cursor: pointer;
        line-height: 1;
        padding: 0 4px;
      }
      .stats-modal-header button:hover {
        color: #e5e7eb;
      }
      .stats-modal-body {
        padding: 20px;
        overflow-y: auto;
        flex: 1;
      }
      /* KPI Cards */
      .stats-kpis {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .stats-kpi {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 14px;
        text-align: center;
      }
      .stats-kpi-value {
        font-size: 1.5rem;
        font-weight: 700;
        line-height: 1.2;
      }
      .stats-kpi-value.green { color: #22c55e; }
      .stats-kpi-value.red { color: #ef4444; }
      .stats-kpi-value.blue { color: #60a5fa; }
      .stats-kpi-value.amber { color: #f59e0b; }
      .stats-kpi-label {
        font-size: 0.75rem;
        color: #9ca3af;
        margin-top: 4px;
      }
      /* Chart */
      .stats-chart-wrap {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 20px;
      }
      .stats-chart-wrap h3 {
        margin: 0 0 12px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #9ca3af;
      }
      .stats-chart-wrap canvas {
        width: 100% !important;
        max-height: 220px;
      }
      /* Status bars */
      .stats-status-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .stats-status-item {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        font-size: 0.85rem;
      }
      .stats-status-label {
        min-width: 110px;
        color: #e5e7eb;
        font-weight: 500;
      }
      .stats-status-bar-bg {
        flex: 1;
        height: 18px;
        background: #1f2937;
        border-radius: 6px;
        overflow: hidden;
      }
      .stats-status-bar {
        display: block;
        height: 100%;
        border-radius: 6px;
        transition: width 0.3s ease;
      }
      .stats-status-count {
        min-width: 50px;
        text-align: right;
        color: #9ca3af;
        font-size: 0.8rem;
      }
      /* Account table */
      .stats-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
      }
      .stats-table th {
        text-align: left;
        color: #9ca3af;
        font-weight: 600;
        padding: 8px 10px;
        border-bottom: 1px solid #374151;
      }
      .stats-table td {
        padding: 8px 10px;
        border-bottom: 1px solid #1f2937;
      }
      /* Insights callout */
      .stats-insights {
        background: #1e293b;
        border-left: 3px solid #f59e0b;
        border-radius: 0 8px 8px 0;
        padding: 12px 16px;
        margin-top: 20px;
      }
      .stats-insights h3 {
        margin: 0 0 8px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #f59e0b;
      }
      .stats-insights ul {
        margin: 0;
        padding: 0 0 0 18px;
        font-size: 0.82rem;
        color: #d1d5db;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="toolbar">
        <button id="statsBtn" type="button" data-email-only title="Statistiques grants" aria-label="Statistiques grants"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg></button>
        <div id="grantDropdown" class="grant-dropdown" data-email-only>
          <button
            id="grantDropdownBtn"
            type="button"
            class="grant-dropdown-btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="grantDropdownMenu"
          >
            <span class="grant-dropdown-btn-main">
              <span id="grantDropdownBtnTitle" class="grant-dropdown-btn-title">Selectionne un grant</span>
              <span id="grantDropdownBtnMeta" class="grant-dropdown-btn-meta">Aucun grant charge</span>
            </span>
            <span id="grantCopyEmailBtn" class="grant-toolbar-copy-btn" title="Copier l'email du grant" role="button" tabindex="0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></span>
            <span class="grant-dropdown-btn-arrow">▼</span>
          </button>
          <div id="grantDropdownMenu" class="grant-dropdown-menu" role="listbox" hidden></div>
        </div>
        <input
          id="subjectSearchInput"
          data-email-only
          type="text"
          placeholder="Recherche Gmail : from:x subject:y has:attachment..."
          aria-label="Recherche native Gmail"
        />
        <button
          id="subjectSearchBtn"
          data-email-only
          type="button"
          title="Lancer la recherche"
          aria-label="Lancer la recherche"
        >
          Rechercher
        </button>
        <button id="refreshBtn" type="button" title="Rafraichir" aria-label="Rafraichir">↻</button>
        <span id="status">Initialisation...</span>
      </section>

      <section class="split">
        <aside class="list">
          <div id="messagesList"></div>
          <button id="loadMoreBtn" type="button" hidden>Charger plus</button>
        </aside>
        <article class="reader" id="readerPanel">
          <p class="empty">Sélectionne un email pour lire son contenu.</p>
        </article>
      </section>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" class="stats-modal" hidden>
      <div class="stats-modal-backdrop"></div>
      <div class="stats-modal-content">
        <div class="stats-modal-header">
          <h2>Grant Stats</h2>
          <button id="statsModalClose" type="button" aria-label="Fermer">&times;</button>
        </div>
        <div id="statsModalBody" class="stats-modal-body">
          <p class="empty">Chargement...</p>
        </div>
      </div>
    </div>

    <script type="module" src="/src/inbox.js"></script>
  </body>
</html>
