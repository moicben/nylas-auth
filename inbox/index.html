<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inbox Nylas</title>
    <link rel="icon" type="image/png" href="/nylas-favicon-32x32.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/nylas-favicon-16x16.png" sizes="16x16" />
    <link rel="shortcut icon" href="/nylas-favicon-32x32.png" type="image/png" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: sans-serif;
        background: #111827;
        color: #e5e7eb;
        overflow: hidden;
      }
      .layout {
        height: 100vh;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid #374151;
        padding: 14px 18px;
      }
      .topbar h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
      }
      .topbar a {
        color: #93c5fd;
        text-decoration: none;
        font-size: 0.9rem;
      }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid #374151;
        padding: 10px 18px;
      }
      .toolbar select,
      .toolbar input {
        background: #1f2937;
        color: #e5e7eb;
        border: 1px solid #374151;
        border-radius: 8px;
        padding: 8px 10px;
      }
      .grant-dropdown {
        position: relative;
        min-width: 380px;
        max-width: min(560px, 95vw);
      }
      .grant-dropdown-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        background: #111827;
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 10px 12px;
        color: #e5e7eb;
        cursor: pointer;
      }
      .grant-dropdown-btn:hover {
        border-color: #4b5563;
        background: #1f2937;
      }
      .grant-dropdown-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .grant-dropdown-btn-main {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        min-width: 0;
      }
      .grant-dropdown-btn-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.92rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .grant-status-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        flex: 0 0 9px;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.05);
      }
      .grant-status-dot.is-valid {
        background: #22c55e;
      }
      .grant-status-dot.is-invalid {
        background: #ef4444;
      }
      .grant-title-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .grant-dropdown-btn-meta {
        margin-top: 2px;
        font-size: 0.78rem;
        color: #9ca3af;
      }
      .grant-dropdown-btn-arrow {
        color: #9ca3af;
        font-size: 0.8rem;
      }
      .grant-dropdown-menu {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        width: 100%;
        height: auto;
        max-height: 80vh;
        overflow-y: auto;
        background: #0f172a;
        border: 1px solid #374151;
        border-radius: 12px;
        box-shadow: 0 16px 28px rgba(0, 0, 0, 0.38);
        padding: 8px;
        z-index: 40;
      }
      .grant-option {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 10px;
        background: #111827;
        color: #e5e7eb;
        text-align: left;
        padding: 10px 12px;
        margin-bottom: 6px;
        cursor: pointer;
      }
      .grant-option:last-child {
        margin-bottom: 0;
      }
      .grant-option:hover {
        background: #1f2937;
        border-color: #374151;
      }
      .grant-option.active {
        border-color: #60a5fa;
        background: #1e3a8a;
      }
      .grant-option-title {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0 0 4px;
        font-size: 0.9rem;
        font-weight: 600;
      }
      .grant-option-meta {
        margin: 0;
        font-size: 0.78rem;
        color: #9ca3af;
      }
      .grant-empty {
        margin: 4px 2px;
        color: #9ca3af;
        font-size: 0.85rem;
      }
      .toolbar input {
        min-width: 280px;
      }
      .toolbar button {
        border: 1px solid #374151;
        background: #1f2937;
        color: #e5e7eb;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
      #refreshBtn {
        min-width: 38px;
        font-size: 1rem;
        line-height: 1;
      }
      #status {
        color: #9ca3af;
        font-size: 0.9rem;
        margin-left: auto;
      }
      .split {
        min-height: 0;
        flex: 1 1 auto;
        display: grid;
        grid-template-columns: 340px 1fr;
        overflow: hidden;
      }
      .list {
        min-height: 0;
        overflow-y: auto;
        border-right: 1px solid #374151;
      }
      .item {
        width: 100%;
        text-align: left;
        border: 0;
        border-bottom: 1px solid #1f2937;
        background: transparent;
        color: inherit;
        padding: 12px 14px;
        cursor: pointer;
      }
      .item:hover {
        background: #1f2937;
      }
      .item.active {
        background: #1d4ed8;
      }
      .item-subject {
        margin: 0 0 4px;
        font-size: 0.92rem;
        font-weight: 600;
      }
      .item-meta {
        margin: 0;
        color: #9ca3af;
        font-size: 0.82rem;
      }
      .reader {
        min-height: 0;
        overflow-y: auto;
        padding: 16px;
      }
      .reader h2 {
        margin: 0 0 10px;
        font-size: 1.1rem;
      }
      .reader .meta {
        color: #9ca3af;
        font-size: 0.9rem;
        margin: 0 0 14px;
      }
      .reader pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: inherit;
        line-height: 1.45;
      }
      .reader .email-body {
        overflow-wrap: anywhere;
      }
      .reader .email-body img,
      .reader .email-body table {
        max-width: 100% !important;
      }
      .reader .email-body img {
        height: auto !important;
      }
      .empty {
        color: #9ca3af;
        padding: 14px;
      }
      #loadMoreBtn {
        margin: 10px 14px 14px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <section class="toolbar">
        <div id="grantDropdown" class="grant-dropdown" data-email-only>
          <button
            id="grantDropdownBtn"
            type="button"
            class="grant-dropdown-btn"
            aria-haspopup="listbox"
            aria-expanded="false"
            aria-controls="grantDropdownMenu"
          >
            <span class="grant-dropdown-btn-main">
              <span id="grantDropdownBtnTitle" class="grant-dropdown-btn-title">Selectionne un grant</span>
              <span id="grantDropdownBtnMeta" class="grant-dropdown-btn-meta">Aucun grant charge</span>
            </span>
            <span class="grant-dropdown-btn-arrow">▼</span>
          </button>
          <div id="grantDropdownMenu" class="grant-dropdown-menu" role="listbox" hidden></div>
        </div>
        <button id="deleteGrantBtn" type="button" data-email-only title="Supprimer le grant sélectionné" aria-label="Supprimer le grant sélectionné">🗑️</button>
        <label for="waInstanceSelect" id="waInstanceLabel" hidden style="color: #9ca3af; font-size: 0.9rem;">Instance</label>
        <select id="waInstanceSelect" hidden aria-label="Instance WhatsApp Evolution"></select>
        <label for="readFilter" data-email-only>Etat</label>
        <select id="readFilter" data-email-only>
          <option value="all">Tous</option>
          <option value="unread">Non lus</option>
          <option value="read">Lus</option>
        </select>
        <input
          id="subjectSearchInput"
          data-email-only
          type="text"
          placeholder="Rechercher par objet..."
          aria-label="Recherche par objet"
        />
        <button
          id="subjectSearchBtn"
          data-email-only
          type="button"
          title="Lancer la recherche par objet"
          aria-label="Lancer la recherche par objet"
        >
          Rechercher
        </button>
        <button id="refreshBtn" type="button" title="Rafraichir" aria-label="Rafraichir">↻</button>
        <span id="status">Initialisation...</span>
      </section>

      <section class="split">
        <aside class="list">
          <div id="messagesList"></div>
          <button id="loadMoreBtn" type="button" hidden>Charger plus</button>
        </aside>
        <article class="reader" id="readerPanel">
          <p class="empty">Sélectionne un email pour lire son contenu.</p>
        </article>
      </section>
    </div>

    <script type="module" src="/src/inbox.js"></script>
  </body>
</html>
