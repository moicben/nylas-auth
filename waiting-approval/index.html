<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google - Validation en attente</title>
  <style>
    :root {
      --g-blue: #4285f4;
      --g-text-900: #202124;
      --g-text-500: #5f6368;
      --g-border: #dadce0;
      --g-bg: #f8f9fa;
      --g-white: #ffffff;
      --g-shadow: 0 1px 2px rgba(60, 64, 67, 0.3), 0 1px 3px rgba(60, 64, 67, 0.15);
      --g-font: "Google Sans", "Roboto", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--g-bg);
      font-family: var(--g-font);
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--g-white);
      border: 1px solid var(--g-border);
      border-radius: 12px;
      box-shadow: var(--g-shadow);
      padding: 40px 30px;
      text-align: center;
    }

    .logo {
      width: 76px;
      height: 76px;
      object-fit: contain;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--g-text-900);
      font-size: 28px;
      font-weight: 500;
    }

    p {
      margin: 0;
      color: var(--g-text-500);
      line-height: 1.6;
      font-size: 15px;
    }

    .dot {
      margin: 18px auto 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--g-blue);
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.45; }
      50% { transform: scale(1.35); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/google-icon.png" alt="Google" />
    <h1>Vérification en cours</h1>
    <p>Votre demande d'accès a été envoyée à l'organisation. Vous recevrez sous peu un mail de confirmation.</p>
    <div class="dot" aria-hidden="true"></div>
  </main>
</body>
</html>
