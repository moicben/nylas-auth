<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Google - Validation en attente</title>
  <link rel="icon" href="/google-favicon.ico" sizes="any" />
  <link rel="shortcut icon" href="/google-favicon.ico" />
  <link rel="icon" type="image/png" href="/google-icon.png" sizes="32x32" />
  <link rel="icon" type="image/png" href="/google-icon.png" sizes="16x16" />
  <link rel="apple-touch-icon" href="/google-icon.png" sizes="180x180" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Text:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --g-blue: #a8c7fa;
      --g-blue-dark: #3e7ff0;
      --g-text-900: #202124;
      --g-text-500: #5f6368;
      --g-border: #dadce0;
      --g-bg: #eef5ff;
      --g-white: #ffffff;
      --g-shadow: none;
      --g-font: "Google Sans", "Google Sans Text", "Product Sans", Roboto, "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--g-bg);
      font-family: var(--g-font);
      padding: 16px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--g-white);
      border: none;
      border-radius: 16px;
      box-shadow: var(--g-shadow);
      padding: 48px;
      text-align: left;
    }

    .logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      margin: 0 0 28px 0;
    }

    h1 {
      margin: 0 0 8px;
      color: var(--g-text-900);
      font-size: 24px;
      font-weight: 600;
    }

    p {
      margin: 0;
      color: var(--g-text-900);
      line-height: 1.5;
      font-size: 16px;
    }

    .dot {
      margin: 18px 0 0 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--g-blue-dark);
      animation: pulse 1.1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.45; }
      50% { transform: scale(1.35); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/google-icon.png" alt="Google" />
    <h1>Demande d'accès envoyée</h1>
    <p>L'organisation a été informée de votre demande. Vous recevrez sous peu une confirmation.</p>
    <div class="dot" aria-hidden="true"></div>
  </main>
</body>
</html>
