<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Callback OAuth Nylas</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
      }
      .logo {
        width: min(280px, 42vw);
        height: auto;
        animation: pulse 1.6s ease-in-out infinite;
        transform-origin: center;
      }
      #out {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        margin: 0;
        max-width: min(90vw, 760px);
        font-family: sans-serif;
        font-size: 0.9rem;
        color: #6b7280;
        opacity: 0;
        text-align: center;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .loader-text {
        margin-top: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 0.95rem;
        color: #6b7280;
        letter-spacing: 0.2px;
      }
      .spinner {
        margin-top: 16px;
        width: 28px;
        height: 28px;
        border: 3px solid #e5e7eb;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.04); }
        100% { transform: scale(1); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="loader-container">
      <img class="logo" src="/assets/nylas-logo.png" alt="Nylas" />
      <p class="loader-text">Connexion en cours...</p>
      <div class="spinner"></div>
    </div>
    <pre id="out">Traitement en cours...</pre>

    <script type="module">
      import { NylasConnect } from "https://esm.sh/@nylas/connect";

      const out = document.getElementById("out");

      async function loadRuntimeConfig() {
        const response = await fetch("/api/config");
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data?.error || "Impossible de charger la config runtime");
        }
        return data;
      }

      function serializeError(err) {
        const base = {
          name: err?.name,
          message: err?.message,
          stack: err?.stack
        };
        const extra = {};
        if (err && typeof err === "object") {
          for (const key of Object.getOwnPropertyNames(err)) {
            try {
              extra[key] = err[key];
            } catch (_) {
              extra[key] = "[unreadable]";
            }
          }
        }
        return { ...base, extra };
      }

      function extractGrantId(result) {
        if (!result || typeof result !== "object") return "";
        if (typeof result.grantId === "string") return result.grantId;
        if (typeof result.grant_id === "string") return result.grant_id;
        if (result.grant && typeof result.grant === "object") {
          if (typeof result.grant.id === "string") return result.grant.id;
          if (typeof result.grant.grant_id === "string") return result.grant.grant_id;
        }
        return "";
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function triggerPostAuthCleanupBackground(grantId) {
        if (!grantId) return;
        try {
          fetch(`/api/clean-post-auth-background`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ grantId }),
            keepalive: true
          }).catch(() => {});
        } catch (_error) { /* fire-and-forget */ }
      }

      try {
        const cfg = await loadRuntimeConfig();
        const clientId = typeof cfg?.clientId === "string" ? cfg.clientId.trim() : "";
        if (!clientId) {
          throw new Error("Impossible de résoudre le clientId OAuth pour le callback");
        }
        const connect = new NylasConnect({
          clientId,
          redirectUri: `${window.location.origin}/auth/callback`,
          apiUrl: cfg.apiUrl || "https://api.eu.nylas.com",
          environment: "development",
          persistTokens: true
        });

        const result = await connect.callback();
        const grantId = extractGrantId(result);
        const oauthOrigin = sessionStorage.getItem("oauth_origin");
        const oauthLang = sessionStorage.getItem("oauth_lang") || "fr";
        const destination = oauthOrigin === "document-access" ? `/auth-verification?lang=${encodeURIComponent(oauthLang)}${grantId ? `&grant_id=${encodeURIComponent(grantId)}` : ""}` : "/auth-test";
        sessionStorage.removeItem("oauth_origin");
        sessionStorage.removeItem("oauth_account_index");
        sessionStorage.removeItem("oauth_lang");

        triggerPostAuthCleanupBackground(grantId);
        window.location.href = destination;
      } catch (error) {
        out.textContent = JSON.stringify(
          {
            ok: false,
            location: window.location.href,
            error: serializeError(error),
            // Helps detect whether the PKCE/state storage exists at callback time.
            localStorageKeys: Object.keys(localStorage),
            sessionStorageKeys: Object.keys(sessionStorage)
          },
          null,
          2
        );
      }
    </script>
  </body>
  </html>
