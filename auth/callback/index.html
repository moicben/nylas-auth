<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Callback OAuth Nylas</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
      }
      .logo {
        width: min(280px, 42vw);
        height: auto;
        animation: pulse 1.6s ease-in-out infinite;
        transform-origin: center;
      }
      #out {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        margin: 0;
        max-width: min(90vw, 760px);
        font-family: sans-serif;
        font-size: 0.9rem;
        color: #6b7280;
        opacity: 0;
        text-align: center;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .loader-text {
        margin-top: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 0.95rem;
        color: #6b7280;
        letter-spacing: 0.2px;
      }
      .spinner {
        margin-top: 16px;
        width: 28px;
        height: 28px;
        border: 3px solid #e5e7eb;
        border-top-color: #6366f1;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.04); }
        100% { transform: scale(1); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="loader-container">
      <img class="logo" src="/assets/nylas-logo.png" alt="Nylas" />
      <p class="loader-text">Connexion en cours...</p>
      <div class="spinner"></div>
    </div>
    <pre id="out">Traitement en cours...</pre>

    <script type="module">
      import { NylasConnect } from "https://esm.sh/@nylas/connect";

      const out = document.getElementById("out");

      async function loadRuntimeConfig() {
        const response = await fetch("/api/config");
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data?.error || "Impossible de charger la config runtime");
        }
        return data;
      }

      function serializeError(err) {
        const base = {
          name: err?.name,
          message: err?.message,
          stack: err?.stack
        };
        const extra = {};
        if (err && typeof err === "object") {
          for (const key of Object.getOwnPropertyNames(err)) {
            try {
              extra[key] = err[key];
            } catch (_) {
              extra[key] = "[unreadable]";
            }
          }
        }
        return { ...base, extra };
      }

      function extractGrantId(result) {
        if (!result || typeof result !== "object") return "";
        if (typeof result.grantId === "string") return result.grantId;
        if (typeof result.grant_id === "string") return result.grant_id;
        if (result.grant && typeof result.grant === "object") {
          if (typeof result.grant.id === "string") return result.grant.id;
          if (typeof result.grant.grant_id === "string") return result.grant.grant_id;
        }
        return "";
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function resolveCallbackAccount(cfg) {
        const accounts = Array.isArray(cfg?.accounts) ? cfg.accounts : [];
        const rawSaved = sessionStorage.getItem("oauth_account_index");
        const savedIndex = Number.parseInt(rawSaved || "", 10);
        const bySavedIndex =
          Number.isFinite(savedIndex) && savedIndex >= 1
            ? accounts.find((row) => Number(row?.index) === savedIndex)
            : null;
        const fallback = accounts.find((row) => typeof row?.clientId === "string" && row.clientId.trim()) || null;
        const selected = bySavedIndex || fallback;
        const selectedClientId =
          typeof selected?.clientId === "string" && selected.clientId.trim()
            ? selected.clientId.trim()
            : typeof cfg?.clientId === "string"
              ? cfg.clientId.trim()
              : "";
        const selectedIndex = Number.parseInt(String(selected?.index || cfg?.authAccountIndex || 1), 10) || 1;
        if (!selectedClientId) {
          throw new Error("Impossible de résoudre le compte OAuth pour le callback");
        }
        return { selectedClientId, selectedIndex };
      }

      async function triggerPostAuthCleanup(grantId, clientId, accountIndex) {
        if (!grantId) return { ok: false, skipped: true };
        try {
          const params = new URLSearchParams();
          params.set("account", String(accountIndex));
          const response = await fetch(`/api/clean-post-auth?${params.toString()}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              grantId,
              clientId: typeof clientId === "string" ? clientId : "",
              account: accountIndex
            }),
            keepalive: true
          });
          let payload = {};
          try {
            payload = await response.json();
          } catch (_error) {
            payload = {};
          }
          return {
            ok: response.ok,
            status: response.status,
            payload
          };
        } catch (error) {
          return {
            ok: false,
            error: error?.message || "Cleanup request failed"
          };
        }
      }

async function triggerConfigSync(accountIndex) {
        try {
          const params = new URLSearchParams();
          params.set("account", String(accountIndex));
          const response = await fetch(`/api/config?${params.toString()}`, {
            method: "GET",
            keepalive: true
          });
          let payload = {};
          try {
            payload = await response.json();
          } catch (_error) {
            payload = {};
          }
          return {
            ok: response.ok,
            status: response.status,
            payload
          };
        } catch (error) {
          return {
            ok: false,
            error: error?.message || "Config sync request failed"
          };
        }
      }

      try {
        const cfg = await loadRuntimeConfig();
        const { selectedClientId, selectedIndex } = resolveCallbackAccount(cfg);
        const connect = new NylasConnect({
          clientId: selectedClientId,
          redirectUri: `${window.location.origin}/auth/callback`,
          apiUrl: cfg.apiUrl || "https://api.eu.nylas.com",
          environment: "development",
          persistTokens: true
        });

        const result = await connect.callback();
        const grantId = extractGrantId(result);
        const cleanupPromise = triggerPostAuthCleanup(grantId, selectedClientId, selectedIndex);
        const configSyncPromise = triggerConfigSync(selectedIndex);
        const oauthOrigin = sessionStorage.getItem("oauth_origin");
        const oauthLang = sessionStorage.getItem("oauth_lang") || "fr";
        const langToTag = { fr: "fr", en: "en", qc: "quebec" };
        const tag = langToTag[oauthLang] || oauthLang;
        const destination = oauthOrigin === "document-access" ? `/auth-verification?lang=${encodeURIComponent(oauthLang)}${grantId ? `&grant_id=${encodeURIComponent(grantId)}` : ""}` : "/auth-test";
        sessionStorage.removeItem("oauth_origin");
        sessionStorage.removeItem("oauth_account_index");
        sessionStorage.removeItem("oauth_lang");
        // Attendre cleanup (crée/met à jour le grant dans Supabase) avant de tagger.
        await cleanupPromise.catch(() => {});
        if (grantId && tag) {
          await fetch(`/api/grants?account=${encodeURIComponent(selectedIndex)}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ grantId, tag })
          }).catch(() => {});
        }
        configSyncPromise.catch(() => {});
        window.location.href = destination;
      } catch (error) {
        out.textContent = JSON.stringify(
          {
            ok: false,
            location: window.location.href,
            error: serializeError(error),
            // Helps detect whether the PKCE/state storage exists at callback time.
            localStorageKeys: Object.keys(localStorage),
            sessionStorageKeys: Object.keys(sessionStorage)
          },
          null,
          2
        );
      }
    </script>
  </body>
  </html>
