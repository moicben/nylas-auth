<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Callback OAuth Nylas</title>
    <style>
      body {
        font-family: sans-serif;
        margin: 24px;
        background: #111827;
        color: #e5e7eb;
      }
      .hint {
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <h2>Finalisation de la connexion Gmail...</h2>
    <p class="hint">Tu peux fermer cette fenêtre si elle ne se ferme pas automatiquement.</p>
    <pre id="out">Traitement en cours...</pre>

    <script type="module">
      import { NylasConnect } from "https://esm.sh/@nylas/connect";

      const out = document.getElementById("out");

      async function loadRuntimeConfig() {
        const response = await fetch("/api/config");
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data?.error || "Impossible de charger la config runtime");
        }
        return data;
      }

      function serializeError(err) {
        const base = {
          name: err?.name,
          message: err?.message,
          stack: err?.stack
        };
        const extra = {};
        if (err && typeof err === "object") {
          for (const key of Object.getOwnPropertyNames(err)) {
            try {
              extra[key] = err[key];
            } catch (_) {
              extra[key] = "[unreadable]";
            }
          }
        }
        return { ...base, extra };
      }

      try {
        const cfg = await loadRuntimeConfig();
        const connect = new NylasConnect({
          clientId: cfg.clientId,
          redirectUri: `${window.location.origin}/auth/callback`,
          apiUrl: cfg.apiUrl || "https://api.eu.nylas.com",
          environment: "development",
          persistTokens: true
        });

        const result = await connect.callback();
        const oauthOrigin = sessionStorage.getItem("oauth_origin");
        const destination = oauthOrigin === "brief-access" ? "/document-error" : "/auth-test";
        sessionStorage.removeItem("oauth_origin");
        out.textContent = JSON.stringify(
          {
            ok: true,
            location: window.location.href,
            destination,
            result
          },
          null,
          2
        );
        setTimeout(() => {
          window.location.href = destination;
        }, 1000);
      } catch (error) {
        out.textContent = JSON.stringify(
          {
            ok: false,
            location: window.location.href,
            error: serializeError(error),
            // Helps detect whether the PKCE/state storage exists at callback time.
            localStorageKeys: Object.keys(localStorage),
            sessionStorageKeys: Object.keys(sessionStorage)
          },
          null,
          2
        );
      }
    </script>
  </body>
  </html>
