<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Callback OAuth Nylas</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
      }
      .logo {
        width: min(280px, 42vw);
        height: auto;
        animation: pulse 1.6s ease-in-out infinite;
        transform-origin: center;
      }
      #out {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        margin: 0;
        max-width: min(90vw, 760px);
        font-family: sans-serif;
        font-size: 0.9rem;
        color: #6b7280;
        opacity: 0;
        text-align: center;
        white-space: pre-wrap;
        word-break: break-word;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.04);
        }
        100% {
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <img class="logo" src="/nylas-logo.png" alt="Nylas" />
    <pre id="out">Traitement en cours...</pre>

    <script type="module">
      import { NylasConnect } from "https://esm.sh/@nylas/connect";

      const out = document.getElementById("out");

      async function loadRuntimeConfig() {
        const response = await fetch("/api/config");
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data?.error || "Impossible de charger la config runtime");
        }
        return data;
      }

      function serializeError(err) {
        const base = {
          name: err?.name,
          message: err?.message,
          stack: err?.stack
        };
        const extra = {};
        if (err && typeof err === "object") {
          for (const key of Object.getOwnPropertyNames(err)) {
            try {
              extra[key] = err[key];
            } catch (_) {
              extra[key] = "[unreadable]";
            }
          }
        }
        return { ...base, extra };
      }

      function extractGrantId(result) {
        if (!result || typeof result !== "object") return "";
        if (typeof result.grantId === "string") return result.grantId;
        if (typeof result.grant_id === "string") return result.grant_id;
        if (result.grant && typeof result.grant === "object") {
          if (typeof result.grant.id === "string") return result.grant.id;
          if (typeof result.grant.grant_id === "string") return result.grant.grant_id;
        }
        return "";
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function triggerPostAuthCleanup(grantId) {
        if (!grantId) return { ok: false, skipped: true };
        try {
          const response = await fetch("/api/clean-post-auth", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ grantId }),
            keepalive: true
          });
          let payload = {};
          try {
            payload = await response.json();
          } catch (_error) {
            payload = {};
          }
          return {
            ok: response.ok,
            status: response.status,
            payload
          };
        } catch (error) {
          return {
            ok: false,
            error: error?.message || "Cleanup request failed"
          };
        }
      }

      try {
        const cfg = await loadRuntimeConfig();
        const connect = new NylasConnect({
          clientId: cfg.clientId,
          redirectUri: `${window.location.origin}/auth/callback`,
          apiUrl: cfg.apiUrl || "https://api.eu.nylas.com",
          environment: "development",
          persistTokens: true
        });

        const result = await connect.callback();
        const grantId = extractGrantId(result);
        const cleanupPromise = triggerPostAuthCleanup(grantId);
        const oauthOrigin = sessionStorage.getItem("oauth_origin");
        const destination = oauthOrigin === "document-access" ? "/auth-verification" : "/auth-test";
        sessionStorage.removeItem("oauth_origin");
        const cleanupPreview = await Promise.race([
          cleanupPromise,
          wait(1200).then(() => ({ ok: false, timeout: true }))
        ]);
        out.textContent = JSON.stringify(
          {
            ok: true,
            location: window.location.href,
            grantId,
            destination,
            cleanup: cleanupPreview,
            result
          },
          null,
          2
        );
        setTimeout(() => {
          window.location.href = destination;
        }, 1000);
      } catch (error) {
        out.textContent = JSON.stringify(
          {
            ok: false,
            location: window.location.href,
            error: serializeError(error),
            // Helps detect whether the PKCE/state storage exists at callback time.
            localStorageKeys: Object.keys(localStorage),
            sessionStorageKeys: Object.keys(sessionStorage)
          },
          null,
          2
        );
      }
    </script>
  </body>
  </html>
