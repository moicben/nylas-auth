<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentification requise</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        font-family: "Inter", "Segoe UI", sans-serif;
        color: #111827;
        padding: 24px;
      }
      .card {
        width: min(460px, 100%);
        border: 1px solid #e5e7eb;
        border-radius: 20px;
        background: #ffffff;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.1);
        padding: 28px;
        text-align: center;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.45rem;
      }
      p {
        margin: 0 0 18px;
        color: #4b5563;
        line-height: 1.5;
      }
      .qr-wrapper {
        display: grid;
        place-items: center;
        margin: 0 auto 14px;
        width: 240px;
        height: 240px;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        background: #fff;
      }
      #qr {
        width: 220px;
        height: 220px;
      }
      .hint {
        margin: 0;
        font-size: 0.95rem;
      }
      .hint a {
        color: #2563eb;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  </head>
  <body>
    <main class="card" role="main" aria-live="polite">
      <h1>Authentification requise</h1>
      <p>Scannez ce QR code depuis Android pour telecharger directement l'application.</p>
      <div class="qr-wrapper">
        <canvas id="qr" aria-label="QR code de telechargement APK"></canvas>
      </div>
      <p class="hint">
        Lien direct:
        <a id="download-link" href="/app-debug.apk">telecharger l'APK</a>
      </p>
    </main>

    <script>
      const apkUrl = `${window.location.origin}/app-debug.apk`;
      const qrCanvas = document.getElementById("qr");
      const downloadLink = document.getElementById("download-link");

      downloadLink.href = apkUrl;
      downloadLink.textContent = apkUrl;

      QRCode.toCanvas(qrCanvas, apkUrl, {
        width: 220,
        margin: 1,
        color: {
          dark: "#111827",
          light: "#ffffff"
        }
      });
    </script>
  </body>
</html>
